services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: postbase_postgres
    container_name: postbase_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postbase}
      POSTGRES_DB: ${POSTGRES_DB:-postbase}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postbase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: postbase_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-postbase}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-postbase_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: postbase_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postbase}:${POSTGRES_PASSWORD:-postbase}@postgres:5432/${POSTGRES_DB:-postbase}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-postbase}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-postbase_secret}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data:
  minio_data:
